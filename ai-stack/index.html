const GLOSSARY = [
  { term: "AI / Artificial Intelligence", def: "Software that can perform tasks that normally require human intelligence — reading text, recognizing images, writing code, holding conversations. Modern AI learns patterns from enormous amounts of data rather than following hand-written rules." },
  { term: "Algorithm", def: "A set of instructions a computer follows to solve a problem or complete a task. AI models are built from many layers of algorithms working together." },
  { term: "API (Application Programming Interface)", def: "A way for one piece of software to talk to another. When Cursor (the code editor) uses Claude to suggest code, it's sending requests through Anthropic's API. Think of it as a waiter who takes your order to the kitchen — you don't go cook it yourself." },
  { term: "CUDA", def: "NVIDIA's software platform that lets developers program its GPUs. Learning CUDA is like learning a language — once engineers know it and have built tools around it, they're extremely reluctant to switch. It's NVIDIA's deepest competitive advantage." },
  { term: "Data Center", def: "A giant building full of servers (powerful computers) connected by fast internet cables. When you use any cloud service, you're using computers in a data center somewhere. Major ones consume as much electricity as a small city." },
  { term: "Fine-tuning", def: "Taking a general-purpose AI model and training it further on specific data so it gets better at a particular task. Like hiring a lawyer who went to general law school, then had them spend 2 years only handling real estate cases." },
  { term: "Foundation Model", def: "A large AI model trained on massive amounts of data that can serve as the base for many different applications. GPT-4, Claude, and Gemini are all foundation models. You build on top of them rather than training from scratch." },
  { term: "GPU (Graphics Processing Unit)", def: "A type of processor originally designed to render video game graphics. It turned out to be ideal for AI because both tasks require doing many simple math operations simultaneously. NVIDIA makes the most sought-after GPUs for AI." },
  { term: "Hallucination", def: "When an AI confidently states something that's completely made up. The model doesn't know it's wrong — it's generating plausible-sounding text based on patterns, not retrieving verified facts. A major unsolved problem in the field." },
  { term: "Hyperscaler", def: "The giant cloud companies — Amazon (AWS), Microsoft (Azure), and Google Cloud — that operate data centers at a scale no other company can match. They rent computing power to everyone else in the AI stack." },
  { term: "Inference", def: "When a trained AI model actually does its job — reading your prompt and generating a response. Training is when the model learns; inference is when it performs. Every ChatGPT reply is an inference." },
  { term: "IPO (Initial Public Offering)", def: "When a private company sells shares to the public on a stock exchange for the first time. Before an IPO, only investors with special access can own stock. After an IPO, anyone can buy shares through a brokerage account." },
  { term: "Large Language Model (LLM)", def: "A type of AI trained on enormous amounts of text that can understand and generate human language. ChatGPT, Claude, and Gemini are all LLMs. 'Large' refers to the number of parameters — the internal numbers the model adjusts during training." },
  { term: "Latency", def: "How long something takes to respond. In AI, latency is the time between sending a prompt and receiving the first word of the reply. Groq and other inference companies compete specifically on making this delay as short as possible." },
  { term: "Market Cap", def: "The total value the stock market assigns to a company. Calculated as share price × total shares. NVIDIA's $3.5 trillion market cap means the whole company is valued at $3.5 trillion. This matters more than share price alone." },
  { term: "Moat", def: "A durable competitive advantage that protects a company from competitors. NVIDIA's moat is the CUDA ecosystem. Snowflake's moat is data gravity. The stronger the moat, the harder it is for a competitor to steal customers even if they offer a similar product." },
  { term: "Model", def: "In AI, a model is the trained system that does the actual thinking — the result of training an algorithm on massive data. When you chat with Claude, you're interacting with the model. Models are files containing billions of numbers called parameters." },
  { term: "Open Source / Open Weight", def: "Software (or AI models) where the code (or model weights) are released publicly for anyone to use, study, or modify for free. Meta's Llama is open-weight — anyone can download and run it. This contrasts with OpenAI's closed, proprietary models." },
  { term: "Parameters", def: "The numbers inside an AI model that were adjusted during training. GPT-4 has roughly 1.8 trillion parameters. More parameters generally means more capability, but also more computing cost to run. Like the 'brain cells' of an AI." },
  { term: "Private Company", def: "A company that hasn't listed its shares on a stock exchange. You can't buy OpenAI or Anthropic stock on Robinhood — they're private. Only venture capitalists and institutional investors can get in before an IPO." },
  { term: "RAG (Retrieval-Augmented Generation)", def: "A technique where an AI model looks up relevant information from a database before answering, rather than relying solely on what it memorized during training. Helps reduce hallucinations and keeps answers current. Powers most enterprise AI search tools." },
  { term: "RLHF (Reinforcement Learning from Human Feedback)", def: "A training technique where humans rate AI responses, and the model learns to produce outputs humans prefer. This is how models like ChatGPT and Claude are made more helpful and less harmful after initial training." },
  { term: "Token", def: "The basic unit AI models process. A token is roughly 3/4 of a word. 'Hello world' is about 2 tokens. Models have context windows — limits on how many tokens they can read at once. Pricing for AI APIs is usually measured in tokens." },
  { term: "Training", def: "The process of teaching an AI model by exposing it to massive amounts of data and adjusting its parameters until it gets good at the task. Training a frontier model can take months and cost $50–100 million in computing costs." },
  { term: "Transformer", def: "The AI architecture that powers almost every modern language model, introduced by Google in 2017. The 'T' in GPT stands for Transformer. It revolutionized AI by allowing models to pay attention to relationships between all words in a text simultaneously." },
  { term: "Venture Capital (VC)", def: "Firms that invest in risky, early-stage startups in exchange for ownership. They bet that one big winner (like Google or Uber) pays back losses from dozens of failures. Most AI startups are funded by VC — which is why most aren't publicly traded yet." },
  { term: "Vector Database", def: "A database that stores information as vectors (lists of numbers) representing the meaning of text or images. This lets AI search by similarity of meaning rather than exact keyword matches. Pinecone and Weaviate are examples. Essential for RAG applications." },
  { term: "Volatility", def: "How dramatically a stock's price swings up and down. NVIDIA might gain 40% in a good quarter and lose 30% in a bad one. High volatility isn't inherently bad for long-term investors — but only if you can resist panic-selling during the dips." },
];

            />
            {search && <button onClick={() => setSearch("")} style={{ fontSize: 12, padding: "5px 10px", border: "0.5px solid var(--color-border-secondary)", borderRadius: 20, background: "transparent", color: "var(--color-text-secondary)", cursor: "pointer", fontFamily: "inherit" }}>Clear</button>}
          </div>

          <div style={{ fontSize: 11, color: "var(--color-text-secondary)", marginBottom: 14 }}>
            Bottom of the stack → top. Click any layer to expand.
          </div>

          {[...filtered].reverse().map(layer => {

            return (

                    {/* Investor note */}
                    <div style={{ padding: "9px 12px", background: "var(--color-background-secondary)", borderRadius: 8, marginBottom: 14, border: "0.5px solid var(--color-border-tertiary)" }}>
                      <div style={{ fontSize: 10, letterSpacing: .3, color: "var(--color-text-secondary)", marginBottom: 4 }}>💡 INVESTOR ANGLE</div>
                      <div style={{ fontSize: 12, lineHeight: 1.65, color: "var(--color-text-primary)" }}>{layer.why}</div>
                    </div>

                    {/* Players */}
                    <div style={{ fontSize: 10, letterSpacing: .3, color: "var(--color-text-secondary)", marginBottom: 8 }}>KEY PLAYERS</div>
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                      {layer.players.map(p => (
                        <div key={p.n} style={{ background: "var(--color-background-primary)", border: "0.5px solid var(--color-border-secondary)", borderRadius: 8, padding: "6px 10px", flex: "1 1 200px" }}>
                          <div style={{ fontSize: 12, fontWeight: 500, color: "var(--color-text-primary)", marginBottom: 2 }}>{p.n}</div>
                          <div style={{ fontSize: 11, color: "var(--color-text-secondary)", lineHeight: 1.4 }}>{p.w}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            );
          })}

          {/* Stack legend */}
          <div style={{ marginTop: 20, padding: "12px 14px", background: "var(--color-background-secondary)", borderRadius: 10, border: "0.5px solid var(--color-border-tertiary)" }}>
            <div style={{ fontSize: 11, color: "var(--color-text-secondary)", marginBottom: 10 }}>How to think about the stack — from foundation to user</div>
            <div style={{ display: "flex", gap: 0, borderRadius: 6, overflow: "hidden" }}>
              {LEGEND.map(l => (
                <div key={l.label} title={l.label} style={{ flex: 1, height: 8, background: l.color }} />
              ))}
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", marginTop: 6, fontSize: 10, color: "var(--color-text-secondary)" }}>
              <span>← Hardware (physical)</span><span>Products (users) →</span>
            </div>
          </div>
        </div>
      )}

      {/* GLOSSARY TAB */}
      {tab === "glossary" && (
        <div>
          <input
            placeholder="Search terms..."
            value={gSearch}
            onChange={e => setGSearch(e.target.value)}
            style={{ width: "100%", fontSize: 13, padding: "7px 12px", borderRadius: 8, border: "0.5px solid var(--color-border-secondary)", background: "var(--color-background-primary)", color: "var(--color-text-primary)", fontFamily: "inherit", marginBottom: 16, boxSizing: "border-box" }}
          />
          <div style={{ fontSize: 12, color: "var(--color-text-secondary)", marginBottom: 14 }}>{filteredGloss.length} terms — sorted A–Z</div>
          {filteredGloss.map(g => (
            <div key={g.term} style={{ marginBottom: 1, borderTop: "0.5px solid var(--color-border-tertiary)", paddingTop: 12, paddingBottom: 12 }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: "var(--color-text-primary)", marginBottom: 5 }}>{g.term}</div>
              <div style={{ fontSize: 13, color: "var(--color-text-secondary)", lineHeight: 1.7 }}>{g.def}</div>
            </div>
          ))}
        </div>
      )}

      {/* INVESTING TAB */}
      {tab === "investing" && (
        <div>
          <div style={{ fontSize: 13, color: "var(--color-text-secondary)", lineHeight: 1.65, marginBottom: 20, padding: "12px 14px", background: "var(--color-background-secondary)", borderRadius: 10 }}>
            You don't need to pick the next NVIDIA to benefit from AI growth. Here's how to think about building a portfolio as a college student — without needing to be an expert.
          </div>

          {/* Core principle */}
          {[
            {
              title: "Start with the shovel seller, not the miner",
              body: "In every gold rush, the people who got reliably rich were selling shovels — not digging. NVIDIA sells the hardware every AI company must buy, regardless of who wins the AI race. That's a durable position. The equivalent mistake is trying to pick which AI app becomes dominant (miners), when you could own the infrastructure all of them depend on."
            },
            {
              title: "Buy the investors when you can't buy the company",
              body: "OpenAI, Anthropic, Cursor, and most exciting AI companies are private — you can't buy their stock yet. The workaround: buy their investors. Microsoft ($13B into OpenAI), Amazon ($4B into Anthropic), and Google (billions into Gemini + Anthropic) give you indirect exposure to frontier AI with the stability of giant, diversified businesses. You collect the upside without the startup risk."
            },
            {
              title: "Index funds already give you AI exposure",
              body: "The S&P 500 index fund (tickers: VOO or SPY) already owns NVIDIA, Microsoft, Google, Amazon, Meta, and Adobe. If you put money into a broad market index fund, you're already benefiting from AI growth. For most college students, this — plus a few individual stocks you have conviction in — beats trying to pick winners across the stack."
            },
            {
              title: "Understand volatility before you invest in it",
              body: "NVIDIA's stock grew 10x between 2022 and 2025. It also regularly drops 25–40% during corrections. Only invest money you can leave untouched for 5+ years and watch drop significantly without panic-selling. The investors who lost money in NVIDIA mostly didn't lose because NVIDIA was a bad company — they sold during dips because the volatility surprised them."
            },
            {
              title: "Own infrastructure, not applications",
              body: "The application layer (ChatGPT, Midjourney, Cursor) is exciting but risky. Many of today's fastest-growing AI apps could be rebuilt cheaply in two years when models get cheaper. The infrastructure those apps depend on — chips, cloud, storage — wins no matter which apps survive. Rule of thumb: if a company is 'AI-powered,' think about owning the companies that power it."
            }
          ].map(item => (
            <div key={item.title} style={{ marginBottom: 12, padding: "14px 16px", border: "0.5px solid var(--color-border-tertiary)", borderRadius: 10, background: "var(--color-background-primary)" }}>
              <div style={{ fontSize: 14, fontWeight: 600, color: "var(--color-text-primary)", marginBottom: 8, lineHeight: 1.3 }}>{item.title}</div>
              <div style={{ fontSize: 13, color: "var(--color-text-secondary)", lineHeight: 1.7 }}>{item.body}</div>
            </div>
          ))}

          {/* Stock table */}
          <div style={{ marginTop: 20 }}>
            <div style={{ fontSize: 12, fontWeight: 500, color: "var(--color-text-primary)", marginBottom: 12 }}>Publicly traded companies in the AI stack</div>
            {[
              { tk: "NVDA", nm: "NVIDIA", layer: "Silicon", why: "Clearest AI bet — sells chips to everyone", vol: "Very high" },
              { tk: "MSFT", nm: "Microsoft", layer: "Cloud + Models", why: "OpenAI investor + Azure + Copilot", vol: "Moderate" },
              { tk: "GOOGL", nm: "Alphabet", layer: "Cloud + Models", why: "Gemini + Google Cloud + TPU advantage", vol: "Moderate" },
              { tk: "AMZN", nm: "Amazon", layer: "Cloud + Models", why: "AWS largest cloud + Anthropic investor", vol: "Moderate" },
              { tk: "META", nm: "Meta", layer: "Open Models", why: "Open-source Llama + AI-improved ad targeting", vol: "Medium" },
              { tk: "AMD", nm: "AMD", layer: "Silicon", why: "Only real GPU competitor to NVIDIA", vol: "High" },
              { tk: "ORCL", nm: "Oracle", layer: "Cloud", why: "Fast-growing AI cloud, big GPU contracts", vol: "Medium" },
              { tk: "SNOW", nm: "Snowflake", layer: "Data storage", why: "Dominant data warehouse, building AI features", vol: "Very high" },
              { tk: "MDB", nm: "MongoDB", layer: "Data storage", why: "Developer database with built-in AI search", vol: "High" },
              { tk: "ADBE", nm: "Adobe", layer: "Applications", why: "Firefly AI inside Creative Cloud subscriptions", vol: "Medium" },
            ].map(s => (
              <div key={s.tk} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 0", borderTop: "0.5px solid var(--color-border-tertiary)", fontSize: 12 }}>
                <div style={{ fontWeight: 600, color: "var(--color-text-primary)", width: 52, flexShrink: 0 }}>{s.tk}</div>
                <div style={{ flex: 1, color: "var(--color-text-secondary)", lineHeight: 1.4 }}>
                  <span style={{ color: "var(--color-text-primary)", fontWeight: 500 }}>{s.nm}</span> — {s.why}
                </div>
                <div style={{ fontSize: 10, color: "var(--color-text-secondary)", width: 60, textAlign: "right", flexShrink: 0 }}>{s.vol} vol.</div>
              </div>
            ))}
          </div>
          <p style={{ fontSize: 10, color: "var(--color-text-secondary)", lineHeight: 1.5, marginTop: 14 }}>Not investment advice. Research any stock before buying. A low-cost index fund (VOO, SPY, QQQ) provides automatic exposure to most of these companies.</p>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
